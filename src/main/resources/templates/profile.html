<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Profile</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-100 font-sans leading-normal tracking-normal">

<div class="container mx-auto p-8 max-w-2xl">

    <div class="flex justify-between items-center mb-6">
        <h1 class="text-3xl font-bold text-gray-800">My Profile</h1>
        <a th:href="@{/api/dashboard}" class="text-blue-600 hover:text-blue-800 font-semibold">
            &larr; Back to Dashboard
        </a>
    </div>

    <div th:if="${param.success}" class="bg-green-100 border border-green-400 text-green-700 px-4 py-3 rounded relative mb-6">
        <span class="block sm:inline">Profile updated successfully!</span>
    </div>

    <div class="bg-white p-8 rounded-lg shadow-md mb-8">
        <h2 class="text-xl font-semibold text-gray-700 mb-6 border-b pb-2">Update Credentials</h2>

        <form th:action="@{/users/profile/update}" th:object="${userDto}" method="POST">

            <div class="mb-4">
                <label class="block text-gray-700 text-sm font-bold mb-2">Username</label>
                <input type="text" th:field="*{username}" required
                       class="w-full border p-2 rounded focus:outline-none focus:ring-2 focus:ring-blue-400">
            </div>

            <div class="mb-4">
                <label class="block text-gray-700 text-sm font-bold mb-2">Email Address</label>
                <input type="email" th:field="*{email}" required
                       class="w-full border p-2 rounded focus:outline-none focus:ring-2 focus:ring-blue-400">
            </div>

            <div class="mb-6">
                <label class="block text-gray-700 text-sm font-bold mb-2">Confirm / New Password</label>
                <input type="password" th:field="*{password}" required placeholder="Enter password to save changes"
                       class="w-full border p-2 rounded focus:outline-none focus:ring-2 focus:ring-blue-400">
            </div>

            <button type="submit" class="bg-blue-600 hover:bg-blue-700 text-white font-bold py-2 px-6 rounded transition duration-200 w-full">
                Save Changes
            </button>
        </form>
    </div>

    <div class="bg-red-50 p-8 rounded-lg shadow-md border border-red-200">
        <h2 class="text-xl font-semibold text-red-700 mb-2">Danger Zone</h2>
        <p class="text-red-600 mb-6 text-sm">Once you delete your account, there is no going back. Please be certain.</p>

        <form th:action="@{/users/profile/delete}" method="POST" onsubmit="return confirm('Are you absolutely sure you want to delete your account? This will wipe all your projects!');">
            <button type="submit" class="bg-red-600 hover:bg-red-700 text-white font-bold py-2 px-6 rounded transition duration-200">
                Delete My Account
            </button>
        </form>
    </div>

</div>

</body>
</html>
