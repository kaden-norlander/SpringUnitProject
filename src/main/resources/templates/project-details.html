<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title th:text="${project.title} + ' - Details'">Project Details</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-100 font-sans leading-normal tracking-normal h-screen flex flex-col">

<div class="bg-white shadow-sm p-6 mb-6">
    <div class="container mx-auto flex justify-between items-center">
        <div>
            <h1 class="text-3xl font-bold text-gray-800" th:text="${project.title}">Project Title</h1>
            <p class="text-gray-500 mt-1" th:text="${project.description}">Project description goes here.</p>
        </div>
        <a th:href="@{/api/dashboard}" class="text-blue-600 hover:text-blue-800 font-semibold bg-blue-50 py-2 px-4 rounded transition duration-200">
            &larr; Back to Dashboard
        </a>
    </div>
</div>

<div class="container mx-auto px-6 flex-grow flex items-start space-x-6 overflow-x-auto pb-8">

    <div th:each="section : ${project.sections}" class="bg-gray-200 rounded-lg p-4 min-w-[320px] w-80 shadow-sm flex-shrink-0">

        <div class="flex justify-between items-center mb-4">
            <h2 class="text-lg font-bold text-gray-700" th:text="${section.name}">Section Name</h2>
        </div>

        <div class="space-y-3 mb-4">

            <div th:each="task : ${section.tasks}" class="bg-white p-3 rounded shadow-sm group">

                <div class="flex items-start justify-between gap-3">

                    <form th:action="@{/tasks/{id}/toggle(id=${task.id})}" method="POST" class="mt-1">
                        <button type="submit" class="focus:outline-none">
                            <span th:if="${task.completed}" class="text-green-500 text-lg hover:text-green-600">✅</span>
                            <span th:unless="${task.completed}" class="text-gray-300 text-lg hover:text-gray-400">⬜</span>
                        </button>
                    </form>

                    <div class="flex-grow">
                        <p class="text-gray-800 font-medium"
                           th:text="${task.title}"
                           th:classappend="${task.completed} ? 'line-through text-gray-400' : ''">
                            Task Title
                        </p>
                        <p class="text-gray-500 text-sm mt-1" th:text="${task.description}">Description...</p>
                    </div>

                    <form th:action="@{/tasks/{id}/delete(id=${task.id})}" method="POST" onsubmit="return confirm('Delete this task?');">
                        <button type="submit" class="text-red-400 hover:text-red-600 opacity-0 group-hover:opacity-100 transition-opacity p-1">
                            🗑️
                        </button>
                    </form>
                </div>
            </div>

            <div th:if="${section.tasks.empty}" class="text-center text-gray-400 text-sm py-2 italic">
                No tasks yet.
            </div>

        </div>

        <form th:action="@{/tasks/section/{sectionId}/add(sectionId=${section.id})}" method="POST" class="mt-4">
            <input type="text" name="title" placeholder="+ Add a task" required
                   class="w-full bg-gray-100 border-none rounded p-2 text-sm focus:bg-white focus:ring-2 focus:ring-blue-400 transition-colors">
            <input type="hidden" name="description" value="">
        </form>

    </div>

    <div class="min-w-[320px] w-80 flex-shrink-0">
        <form th:action="@{/sections/project/{projectId}/add(projectId=${project.id})}" method="POST" class="bg-gray-200 rounded-lg p-4 hover:bg-gray-300 transition-colors">
            <input type="text" name="name" placeholder="+ Add another section" required
                   class="w-full bg-transparent border-none rounded p-2 text-sm font-semibold text-gray-600 placeholder-gray-500 focus:bg-white focus:ring-2 focus:ring-blue-400 transition-colors">
        </form>
    </div>

</div>

</body>
</html>
